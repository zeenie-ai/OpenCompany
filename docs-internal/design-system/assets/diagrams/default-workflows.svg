<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1020" width="100%" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"></path>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"></path>
    </marker>
    <marker id="arr-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#06b6d4"></path>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"></path>
    </marker>
    
  </defs>

  <rect width="1100" height="1020" class="bg"></rect>

  
  <text x="550" y="40" text-anchor="middle" class="header-text">Three Workflows You Get on Day One</text>
  <text x="550" y="62" text-anchor="middle" class="header-sub">Open OpenCompany for the first time and these are already loaded. Each shows a different pattern you can copy.</text>

  
  
  
  <rect x="30" y="90" width="1040" height="240" class="row-card row-1"></rect>
  <circle cx="58" cy="118" r="14" class="num-bg-1"></circle>
  <text x="58" y="123" text-anchor="middle" class="num-txt">1</text>
  <text x="84" y="118" class="row-title">AI Assistant</text>
  <text x="84" y="135" class="row-tag">16 nodes · one smart agent with a full toolbox</text>

  
  <rect x="50" y="180" width="120" height="38" class="node-box node-trigger" rx="8"></rect>
  <text x="110" y="198" text-anchor="middle" class="node-txt">💬 Chat</text>
  <text x="110" y="212" text-anchor="middle" class="node-sub">in-app panel</text>

  <rect x="50" y="232" width="120" height="38" class="node-box node-trigger" rx="8"></rect>
  <text x="110" y="250" text-anchor="middle" class="node-txt">📱 Telegram</text>
  <text x="110" y="264" text-anchor="middle" class="node-sub">incoming message</text>

  
  <rect x="280" y="195" width="160" height="60" class="node-box node-agent-1" rx="10"></rect>
  <text x="360" y="220" text-anchor="middle" class="node-txt" style="font-size: 14px;">🤖 AI Agent</text>
  <text x="360" y="240" text-anchor="middle" class="node-sub">thinks, decides, acts</text>

  
