# Release workflow: predeploy gate, publish npm + GitHub Packages.
# Triggers on version tag push.

name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  predeploy:
    uses: ./.github/workflows/predeploy.yml

  publish-npm:
    name: Publish to npm
    needs: predeploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '22'
          package-manager-cache: false
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: python -m cli version sync
      - name: Verify npm credentials
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish public npm package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-packages:
    name: Publish to GitHub Packages
    needs: predeploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '22'
          package-manager-cache: false
          registry-url: 'https://npm.pkg.github.com'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: python -m cli version sync
      - name: Configure scoped package
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@zeenie-ai/opencompany';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
      # GitHub Packages uses the repository-scoped GITHUB_TOKEN; npm's OIDC
      # trusted-publisher flow applies to npmjs.org, not npm.pkg.github.com.
      - run: npm publish # zizmor: ignore[use-trusted-publishing]
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
