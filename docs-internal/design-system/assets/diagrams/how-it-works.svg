<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="100%" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, sans-serif">
