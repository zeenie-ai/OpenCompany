<!-- @dsCard group="Colors" viewport="700x150" subtitle="Solarized dark surfaces — the signature look" name="Surfaces — Dark" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="background: var(--bg-app); padding: 16px; margin: 0;">
<div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;">
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--bg-app); border: 1px solid var(--border-default);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--bg-app<br>#002b36</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--bg-panel); border: 1px solid var(--border-default);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--bg-panel<br>#073642</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--bg-elevated); border: 1px solid var(--border-default);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--bg-elevated<br>#0d1f2d</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--fg-default);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--fg-default<br>#f8f8f2</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--dracula-comment);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">comment<br>#6272a4</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--border-default);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--border-default<br>#586e75</div>
  </div>
</div>
</body>
</html>
