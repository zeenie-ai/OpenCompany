# pre-commit hooks — Python (ruff-format) + workflow validation (actionlint).
#
# Install once with:   pre-commit install
# Run on all files:    pre-commit run --all-files
#
# Scope is deliberately narrow: only validators (yaml/toml/json shape,
# merge-conflict markers, oversized files, private keys, workflow
# schema) plus ruff-format. The frontend ``prettier`` / ``eslint``
# hooks and the ``ruff check`` lint pass were dropped because they
# produced multi-hundred-file format diffs against an already-shipped
# tree -- the team runs ``pnpm --filter react-flow-client run lint``
# in ``predeploy.yml`` for the real lint gate, and ``ruff check`` is
# available ad hoc.
#
# Likewise the stdlib ``end-of-file-fixer`` / ``trailing-whitespace``
# hooks are off: they flag editor artefacts uniformly across vendored
# SVG / JSON / .env files and the noise outweighs the signal.

default_install_hook_types:
  - pre-commit
  - commit-msg

default_stages: [pre-commit]

repos:
  # ---------------------------------------------------------------- validators
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-toml
      - id: check-json
        # Workflow JSON exports keep wide whitespace + trailing comma
        # tolerance for the React Flow round-trip. Validators against
        # strict JSON have flagged them historically; the schema
        # validator inside ``services.workflow_import`` is the real
        # gate.
        exclude: '^\.machina/workflows/.*\.json$'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key

  # ---------------------------------------------------------------- Python: ruff-format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-format
        types_or: [python, pyi]

  # ---------------------------------------------------------------- Workflows: actionlint
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.4
    hooks:
      - id: actionlint
