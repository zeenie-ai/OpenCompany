<!-- @dsCard group="Brand" viewport="700x150" subtitle="Stand-in wordmark — no official logo in repo (see readme caveats)" name="Wordmark" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="background: var(--bg-app); margin: 0; display: flex; align-items: center; justify-content: center; height: 130px; gap: 40px;">
<div style="display: flex; align-items: center; gap: 14px;">
  <div style="width: 40px; height: 40px; border-radius: 10px; border: 2px solid color-mix(in srgb, var(--dracula-cyan) 60%, transparent); background: linear-gradient(135deg, color-mix(in srgb, var(--dracula-cyan) 18%, var(--surface-card)), var(--surface-card)); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px color-mix(in srgb, var(--dracula-cyan) 25%, transparent);">
    <span style="font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--dracula-cyan);">M</span>
  </div>
  <div>
    <div style="font-family: var(--font-sans); font-size: 26px; font-weight: 600; color: var(--fg-default); letter-spacing: -0.01em;">MachinaOS</div>
    <div style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--fg-muted);">by zeenie.ai</div>
  </div>
</div>
</body>
</html>
