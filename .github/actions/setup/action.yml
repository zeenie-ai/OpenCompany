# Shared environment setup: Node, Python, uv, CLI deps.
name: 'Setup OpenCompany Environment'
description: 'Setup Node.js, Python, uv, and the supervisor CLI.'

inputs:
  node-version:
    description: 'Node.js version'
    default: '22'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
    - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: false
        # Explicitly disabled: release jobs carry publish credentials, and
        # several lanes never run pnpm, which also makes post-job cache saves
        # fail with Path Validation Error.
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.12'
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: false
    - name: Install supervisor CLI
      shell: bash
      run: uv pip install --system -e .
