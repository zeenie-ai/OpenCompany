<!-- @dsCard group="Colors" viewport="700x170" subtitle="Canvas node role colors — 8% soft fill, 30% border, full-strength accents" name="Node Roles" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="background: var(--bg-app); padding: 16px; margin: 0;">
<div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
  <div style="border-radius: 10px; border: 2px solid var(--node-agent-border); background: linear-gradient(135deg, color-mix(in srgb, var(--node-agent) 14%, var(--surface-card)), var(--surface-card)); padding: 12px; text-align: center;">
    <div style="font-size: 13px; font-weight: 600; color: var(--node-agent);">Agent</div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 4px;">purple</div>
  </div>
  <div style="border-radius: 10px; border: 2px solid var(--node-model-border); background: linear-gradient(135deg, color-mix(in srgb, var(--node-model) 14%, var(--surface-card)), var(--surface-card)); padding: 12px; text-align: center;">
    <div style="font-size: 13px; font-weight: 600; color: var(--node-model);">Model</div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 4px;">cyan</div>
  </div>
  <div style="border-radius: 10px; border: 2px solid var(--node-tool-border); background: linear-gradient(135deg, color-mix(in srgb, var(--node-tool) 14%, var(--surface-card)), var(--surface-card)); padding: 12px; text-align: center;">
    <div style="font-size: 13px; font-weight: 600; color: var(--node-tool);">Tool / Skill</div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 4px;">green</div>
  </div>
  <div style="border-radius: 10px; border: 2px solid var(--node-trigger-border); background: linear-gradient(135deg, color-mix(in srgb, var(--node-trigger) 14%, var(--surface-card)), var(--surface-card)); padding: 12px; text-align: center;">
    <div style="font-size: 13px; font-weight: 600; color: var(--node-trigger);">Trigger</div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 4px;">pink</div>
  </div>
  <div style="border-radius: 10px; border: 2px solid var(--node-workflow-border); background: linear-gradient(135deg, color-mix(in srgb, var(--node-workflow) 14%, var(--surface-card)), var(--surface-card)); padding: 12px; text-align: center;">
    <div style="font-size: 13px; font-weight: 600; color: var(--node-workflow);">Workflow</div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 4px;">orange</div>
  </div>
</div>
</body>
</html>
