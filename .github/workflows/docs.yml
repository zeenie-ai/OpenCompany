# Deploy Mintlify docs on push to docs-MachinaOs/.
name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-MachinaOs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install -g mintlify
      - working-directory: docs-MachinaOs
        env:
          MINTLIFY_TOKEN: ${{ secrets.MINTLIFY_TOKEN }}
        run: mintlify deploy
