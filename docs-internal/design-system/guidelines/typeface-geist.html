<!-- @dsCard group="Type" viewport="700x170" subtitle="Geist — one family for display & body" name="Typeface — Geist" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="background: var(--bg-app); margin: 0; padding: 20px 24px;">
<div style="font-family: var(--font-sans); font-size: 34px; font-weight: 600; color: var(--fg-default); letter-spacing: -0.01em;">Your own AI assistant that does real work.</div>
<div style="display: flex; gap: 24px; margin-top: 14px; align-items: baseline;">
  <span style="font-family: var(--font-sans); font-weight: 400; font-size: 15px; color: var(--fg-muted);">Regular 400</span>
  <span style="font-family: var(--font-sans); font-weight: 500; font-size: 15px; color: var(--fg-default);">Medium 500</span>
  <span style="font-family: var(--font-sans); font-weight: 600; font-size: 15px; color: var(--fg-default);">Semibold 600</span>
  <span style="font-family: var(--font-sans); font-weight: 700; font-size: 15px; color: var(--fg-default);">Bold 700</span>
  <span style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint);">--font-sans: 'Geist'</span>
</div>
</body>
</html>
