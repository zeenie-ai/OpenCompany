<!-- @dsCard group="Colors" viewport="700x150" subtitle="Light structural surfaces & foreground" name="Surfaces — Light" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="background: var(--bg-app); padding: 16px; margin: 0;">
<div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;">
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--bg-app); border: 1px solid var(--border-default);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--bg-app<br>#f5f7fa</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--bg-panel); border: 1px solid var(--border-default);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--bg-panel<br>#fafbfc</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--bg-elevated); border: 1px solid var(--border-default); box-shadow: var(--shadow-card);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--bg-elevated<br>#ffffff</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--fg-default);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--fg-default<br>#1a1d21</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--fg-muted);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--fg-muted<br>#4b5563</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 64px; border-radius: 8px; background: var(--border-default);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">--border-default<br>#d1d5db</div>
  </div>
</div>
</body>
</html>
