<!-- @dsCard group="Type" viewport="700x150" subtitle="Mono is the machine voice — counts, state, timestamps" name="Mono Usage" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="background: var(--bg-app); margin: 0; padding: 16px 24px;">
<div style="display: flex; flex-direction: column; gap: 12px;">
  <div style="display: flex; height: 24px; align-items: center; gap: 12px; border-top: 1px solid var(--border-default); border-bottom: 1px solid var(--border-default); background: var(--bg-panel); padding: 0 14px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--fg-muted);">
    <span style="color: var(--success); display: flex; align-items: center; gap: 6px;"><span style="width: 6px; height: 6px; border-radius: 99px; background: var(--success); display: inline-block;"></span>ONLINE</span>
    <span style="opacity: 0.4;">|</span>
    <span>WF: <span style="color: var(--fg-default);">WhatsApp Assistant</span></span>
    <span style="opacity: 0.4;">|</span>
    <span>NODES: <span style="color: var(--fg-default);">12</span></span>
    <span style="margin-left: auto;">THEME: <span style="color: var(--fg-default);">DARK</span></span>
    <span style="opacity: 0.4;">|</span>
    <span>14:02:33</span>
  </div>
  <div style="display: flex; gap: 16px; align-items: center;">
    <span style="font-family: var(--font-mono); font-size: 12px; color: var(--warning);">● Modified</span>
    <span style="font-family: var(--font-mono); font-size: 12px; color: var(--success);">● Saved</span>
    <span style="font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted);">12 nodes · Jun 11, 09:14</span>
    <span style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint);">--font-mono: 'JetBrains Mono'</span>
  </div>
</div>
</body>
</html>
