  <text x="665" y="485" text-anchor="middle" class="node-sub">Gmail · Calendar · Drive · Sheets</text>

  <rect x="555" y="505" width="220" height="48" class="node-box node-agent-2" rx="8"></rect>
  <text x="665" y="524" text-anchor="middle" class="node-txt">🗺 Travel Agent</text>
  <text x="665" y="540" text-anchor="middle" class="node-sub">Maps · geocoding · nearby places</text>

  <rect x="555" y="560" width="220" height="48" class="node-box node-agent-2" rx="8"></rect>
  <text x="665" y="579" text-anchor="middle" class="node-txt">🌐 Web Agent</text>
  <text x="665" y="595" text-anchor="middle" class="node-sub">browser · HTTP · web search</text>

  <rect x="555" y="615" width="220" height="48" class="node-box node-agent-2" rx="8"></rect>
  <text x="665" y="634" text-anchor="middle" class="node-txt">💬 Social Agent</text>
  <text x="665" y="650" text-anchor="middle" class="node-sub">Twitter · WhatsApp</text>

  
  <path d="M 410 480 Q 480 480 480 419 L 555 419" class="conn-delegate" marker-end="url(#arr-cyan)"></path>
  <path d="M 410 490 Q 490 490 490 474 L 555 474" class="conn-delegate" marker-end="url(#arr-cyan)"></path>
  <path d="M 410 500 L 555 529" class="conn-delegate" marker-end="url(#arr-cyan)"></path>
  <path d="M 410 510 Q 490 510 490 584 L 555 584" class="conn-delegate" marker-end="url(#arr-cyan)"></path>
  <path d="M 410 520 Q 480 520 480 639 L 555 639" class="conn-delegate" marker-end="url(#arr-cyan)"></path>

  
  <text x="785" y="430" class="label-italic">each has its own</text>
  <text x="785" y="445" class="label-italic">memory · skills · tools</text>

  
  <rect x="830" y="540" width="180" height="38" class="node-box node-output" rx="8"></rect>
  <text x="920" y="558" text-anchor="middle" class="node-txt">📤 Telegram</text>
  <text x="920" y="572" text-anchor="middle" class="node-sub">reply to user</text>

  <rect x="830" y="585" width="180" height="38" class="node-box node-output" rx="8"></rect>
  <text x="920" y="603" text-anchor="middle" class="node-txt">📝 Console</text>
  <text x="920" y="617" text-anchor="middle" class="node-sub">per-agent logs</text>

  
  <text x="58" y="678" class="row-use">USE WHEN:</text>
  <text x="155" y="678" class="row-desc">You want one chat that handles everything — and each domain has a specialist that&#39;s actually good at it.</text>

  
  
  
  <rect x="30" y="720" width="1040" height="240" class="row-card row-3"></rect>
  <circle cx="58" cy="748" r="14" class="num-bg-3"></circle>
