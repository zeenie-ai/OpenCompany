<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4 / 8 / 12 / 16 / 24 / 32 / 48 / 64" name="Space Scale" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="background: var(--bg-app); margin: 0; padding: 18px 24px;">
<div style="display: flex; align-items: flex-end; gap: 18px;">
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width: 4px; height: 4px; background: var(--accent); border-radius: 2px;"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">1·4</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width: 8px; height: 8px; background: var(--accent); border-radius: 2px;"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">2·8</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width: 12px; height: 12px; background: var(--accent); border-radius: 2px;"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">3·12</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width: 16px; height: 16px; background: var(--accent); border-radius: 3px;"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">4·16</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width: 24px; height: 24px; background: var(--accent); border-radius: 4px;"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">5·24</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width: 32px; height: 32px; background: var(--accent); border-radius: 5px;"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">6·32</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width: 48px; height: 48px; background: var(--accent); border-radius: 6px;"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">7·48</span></div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width: 64px; height: 64px; background: var(--accent); border-radius: 8px;"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">8·64</span></div>
</div>
</body>
</html>
