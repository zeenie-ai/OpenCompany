  <rect x="365" y="908" width="80" height="28" class="node-box node-helper" rx="5"></rect>
  <text x="405" y="926" text-anchor="middle" class="node-sub">📚 Skills</text>

  <path d="M 320 885 L 310 908" class="conn-dotted"></path>
  <path d="M 400 885 L 405 908" class="conn-dotted"></path>

  
  <rect x="490" y="800" width="280" height="120" class="node-box" rx="10" style="fill: #fafafa; stroke: #d1d5db;"></rect>
  <text x="630" y="820" text-anchor="middle" class="node-txt" style="fill: #6b7280;">🔧 Coding Toolbox</text>

  <rect x="500" y="830" width="84" height="22" class="node-tool" rx="5"></rect>
  <text x="542" y="845" text-anchor="middle" class="node-sub">📄 Files</text>

  <rect x="592" y="830" width="84" height="22" class="node-tool" rx="5"></rect>
  <text x="634" y="845" text-anchor="middle" class="node-sub">🔎 FS Search</text>

  <rect x="684" y="830" width="84" height="22" class="node-tool" rx="5"></rect>
  <text x="726" y="845" text-anchor="middle" class="node-sub">💻 Shell</text>

  <rect x="500" y="858" width="84" height="22" class="node-tool" rx="5"></rect>
  <text x="542" y="873" text-anchor="middle" class="node-sub">⚙ Processes</text>

  <rect x="592" y="858" width="84" height="22" class="node-tool" rx="5"></rect>
  <text x="634" y="873" text-anchor="middle" class="node-sub">🌐 Browser</text>

  <rect x="684" y="858" width="84" height="22" class="node-tool" rx="5"></rect>
  <text x="726" y="873" text-anchor="middle" class="node-sub">🔍 Search</text>

  <rect x="592" y="886" width="84" height="22" class="node-tool" rx="5"></rect>
  <text x="634" y="901" text-anchor="middle" class="node-sub">📋 Todos</text>

  <path d="M 440 855 L 490 855" class="conn-flow-3" marker-end="url(#arr-green)"></path>

  
  <rect x="830" y="810" width="180" height="38" class="node-box node-output" rx="8"></rect>
  <text x="920" y="828" text-anchor="middle" class="node-txt">📤 Telegram Send</text>
  <text x="920" y="842" text-anchor="middle" class="node-sub">reply to user</text>

  <rect x="830" y="862" width="180" height="38" class="node-box node-output" rx="8"></rect>
  <text x="920" y="880" text-anchor="middle" class="node-txt">📝 Console</text>
  <text x="920" y="894" text-anchor="middle" class="node-sub">live log in UI</text>

  <path d="M 770 829 L 830 829" class="conn-flow-3" marker-end="url(#arr-green)"></path>
  <path d="M 770 881 L 830 881" class="conn-flow-3" marker-end="url(#arr-green)"></path>

  
  <text x="58" y="945" class="row-use">USE WHEN:</text>
  <text x="155" y="945" class="row-desc">Your AI needs to actually ship code — refactor, build features, debug — across sessions that persist.</text>

  
  <text x="550" y="995" text-anchor="middle" class="label-italic" style="font-size: 12px;">All three are real .json files in the /workflows folder. Open them in the canvas, edit anything, save as your own.</text>

