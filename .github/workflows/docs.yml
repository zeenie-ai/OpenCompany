# Deploy Mintlify documentation
# Triggers on push to docs-MachinaOs/ or manual dispatch

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-MachinaOs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install Mintlify CLI
        run: npm install -g mintlify

      - name: Deploy to Mintlify
        working-directory: docs-MachinaOs
        env:
          MINTLIFY_TOKEN: ${{ secrets.MINTLIFY_TOKEN }}
        run: mintlify deploy
