  <path d="M 175 251 L 280 235" class="conn-flow-1" marker-end="url(#arr-purple)"></path>

  
  <rect x="220" y="280" width="100" height="32" class="node-box node-helper" rx="6"></rect>
  <text x="270" y="299" text-anchor="middle" class="node-txt">🧠 Memory</text>

