# Release workflow - predeploy gate, publish, GitHub release, then test install
#
# Hardening (May 2026, lifted from gh CLI / vercel / wrangler / uv):
#   - workflow_dispatch defaults to dry-run; pushes need explicit
#     dry_run=false (gemini-cli pattern; reduces accidental
#     publications from an admin clicking Run workflow).
#   - NPM_CONFIG_PROVENANCE=true via env (idiom from vercel) instead
#     of the per-command --provenance flag; survives any future
#     npm publish callsite change.
#   - SLSA build provenance attestation via actions/attest-build-
#     provenance@v2 (uv + gh CLI pattern). Renders on the GitHub
#     release as a verifiable supply-chain claim.
#   - Cache disabled in release-only setup steps (wrangler pattern)
#     to prevent a poisoned cache from previous CI runs from
#     contaminating the release tarball.
#   - pnpm audit is now BLOCKING; the old `|| true` swallowed
#     vulnerabilities.

name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip the publish step (validate only).'
        type: boolean
        default: true

# Top-level permissions for all jobs (jobs can narrow further)
permissions:
  contents: write
  packages: write
  id-token: write

# `dry_run` is only meaningful on workflow_dispatch; tag-pushed
# releases always publish. Computed once and surfaced to each
# publish job via `if:` gates below.
env:
  IS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
  # Enables npm provenance for every `npm publish` in this workflow
  # (https://docs.npmjs.com/generating-provenance-statements). Vercel
  # pattern -- supersedes --provenance per-command flag so any future
  # publish callsite picks it up automatically.
  NPM_CONFIG_PROVENANCE: 'true'

jobs:
  predeploy:
    uses: ./.github/workflows/predeploy.yml

  # Audit production dependencies before publishing
  audit:
    name: Security Audit
    needs: predeploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Audit production dependencies
        # BLOCKING: a vulnerability in a prod dep must stop the release
        # (previous `|| true` masked everything). To temporarily bypass,
        # bump the audit-level threshold rather than re-introducing the
        # silent fail.
        run: pnpm audit --prod --audit-level moderate

  # Build client once after predeploy passes, share with publish jobs
  build-for-publish:
    name: Build for Publishing
    needs: [predeploy, audit]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Install and build client
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter react-flow-client run build

      - name: Upload built client
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 1

  publish-npm:
    name: Publish to npm (with provenance)
    needs: build-for-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          # cache: false in release jobs (wrangler hardening). A
          # poisoned cache from previous CI runs cannot taint the
          # tarball; release-time installs always pull fresh.
          cache: ''

      - name: Download built client
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: client-dist
          path: client/dist

      - name: Install dependencies (skip scripts)
        run: npm install --ignore-scripts

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version

      - name: Sync versions from git tag
        run: python -m cli version sync

      - name: Verify package contents (and pack for attestation)
        # `npm pack` (without --dry-run) writes the tarball to disk so
        # we can attest it. The tarball name pattern is
        # `<scoped-name-with-dash>-<version>.tgz`, e.g. `machinaos-0.0.72.tgz`.
        run: npm pack

      - name: Generate SLSA build provenance for the npm tarball
        # Pattern from gh CLI + uv: attest-build-provenance signs the
        # artifact via the workflow's OIDC token, publishes the
        # attestation to GitHub's transparency log + Sigstore, and
        # links it to the release. Verifiable via
        # `gh attestation verify <tarball> --repo <owner>/<repo>`.
        if: env.IS_DRY_RUN != 'true'
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: '*.tgz'

      - name: Publish to npm
        # NPM_CONFIG_PROVENANCE env (top of workflow) enables provenance
        # for `npm publish` -- no per-command flag needed.
        if: env.IS_DRY_RUN != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run -- skipping npm publish
        if: env.IS_DRY_RUN == 'true'
        run: echo "::notice::workflow_dispatch dry_run=true -- publish step skipped. Re-run with dry_run=false to publish."

  publish-github-packages:
    name: Publish to GitHub Packages
    needs: build-for-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          # cache: false in release jobs (wrangler hardening).
          cache: ''

      - name: Download built client
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: client-dist
          path: client/dist

      - name: Install dependencies (skip scripts)
        run: npm install --ignore-scripts

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version

      - name: Sync versions from git tag
        run: python -m cli version sync

      - name: Configure scoped package
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@zeenie-ai/machinaos';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Publish to GitHub Packages
        if: env.IS_DRY_RUN != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry-run -- skipping GitHub Packages publish
        if: env.IS_DRY_RUN == 'true'
        run: echo "::notice::workflow_dispatch dry_run=true -- GitHub Packages publish step skipped."

  # Publish machinaos-server to PyPI via OIDC trusted publishing.
  # Runs in parallel with the npm publish jobs after the build-for-publish
  # step succeeds. Dry-run propagates from this workflow's input.
  publish-pypi:
    name: Publish to PyPI
    needs: [predeploy, audit]
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/publish-pypi.yml
    with:
      package_dir: server
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}

  # Create GitHub Release with auto-generated notes
  create-github-release:
    name: Create GitHub Release
    needs: [publish-npm, publish-github-packages, publish-pypi]
    # Skipped during dry-run -- there's no published release to point at
    # and we don't want to leave stale release notes around.
    if: needs.publish-npm.result == 'success' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "MachinaOS ${{ steps.version.outputs.version }}" \
            --generate-notes \
            --verify-tag

  # Test user installation after publishing (skipped on dry-run since
  # there's nothing newly published to install).
  test-install:
    needs: [create-github-release]
    if: needs.create-github-release.result == 'success'
    uses: ./.github/workflows/test-install.yml
