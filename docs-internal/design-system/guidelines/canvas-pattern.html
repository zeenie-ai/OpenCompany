<!-- @dsCard group="Brand" viewport="700x190" subtitle="Canvas texture — dot grid + dashed accent edges between node handles" name="Canvas Pattern" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="margin: 0; background: var(--bg-canvas);">
<div style="position: relative; height: 190px; background-image: radial-gradient(color-mix(in srgb, var(--fg-muted) 30%, transparent) 1px, transparent 1px); background-size: 20px 20px;">
  <svg width="100%" height="100%" style="position: absolute; inset: 0;">
    <path d="M 120 95 C 220 95, 260 60, 360 60" fill="none" stroke="var(--dracula-cyan)" stroke-width="2" stroke-dasharray="6 6" opacity="0.85"></path>
    <path d="M 120 95 C 220 95, 260 130, 360 130" fill="none" stroke="var(--dracula-green)" stroke-width="2" stroke-dasharray="6 6" opacity="0.85"></path>
  </svg>
  <div style="position: absolute; left: 60px; top: 65px; width: 60px; height: 60px; border-radius: 10px; border: 2px solid color-mix(in srgb, var(--dracula-purple) 60%, transparent); background: linear-gradient(135deg, color-mix(in srgb, var(--dracula-purple) 18%, var(--surface-card)), var(--surface-card)); box-shadow: 0 2px 8px color-mix(in srgb, var(--dracula-purple) 18%, transparent);"></div>
  <div style="position: absolute; left: 360px; top: 30px; width: 60px; height: 60px; border-radius: 10px; border: 2px solid color-mix(in srgb, var(--dracula-cyan) 60%, transparent); background: linear-gradient(135deg, color-mix(in srgb, var(--dracula-cyan) 18%, var(--surface-card)), var(--surface-card)); box-shadow: 0 2px 8px color-mix(in srgb, var(--dracula-cyan) 18%, transparent);"></div>
  <div style="position: absolute; left: 360px; top: 100px; width: 60px; height: 60px; border-radius: 10px; border: 2px solid color-mix(in srgb, var(--dracula-green) 60%, transparent); background: linear-gradient(135deg, color-mix(in srgb, var(--dracula-green) 18%, var(--surface-card)), var(--surface-card)); box-shadow: 0 2px 8px color-mix(in srgb, var(--dracula-green) 18%, transparent);"></div>
</div>
</body>
</html>
