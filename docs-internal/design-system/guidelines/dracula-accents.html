<!-- @dsCard group="Colors" viewport="700x150" subtitle="Vibrant accents — identical in light & dark, used as soft tints" name="Dracula Accents" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="background: var(--bg-app); padding: 16px; margin: 0;">
<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;">
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 60px; border-radius: 8px; background: var(--dracula-green);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">green<br>#50fa7b</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 60px; border-radius: 8px; background: var(--dracula-cyan);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">cyan<br>#8be9fd</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 60px; border-radius: 8px; background: var(--dracula-purple);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">purple<br>#bd93f9</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 60px; border-radius: 8px; background: var(--dracula-pink);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">pink<br>#ff79c6</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 60px; border-radius: 8px; background: var(--dracula-orange);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">orange<br>#ffb86c</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 60px; border-radius: 8px; background: var(--dracula-yellow);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">yellow<br>#f1fa8c</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 6px;">
    <div style="height: 60px; border-radius: 8px; background: var(--dracula-red);"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);">red<br>#ff5555</div>
  </div>
</div>
</body>
</html>
