  <text x="684" y="194" text-anchor="middle" class="node-mini-text" style="font-size: 9px; fill: #6b7280;">output</text>

  <path d="M 482 181 L 515 181" class="flow-arrow" marker-end="url(#arrow-flow)"></path>
  <path d="M 615 181 L 648 181" class="flow-arrow" marker-end="url(#arrow-flow)"></path>

  
  <rect x="430" y="220" width="80" height="22" class="node-mini" rx="6" style="fill: #f0fdfa; stroke: #06b6d4;"></rect>
