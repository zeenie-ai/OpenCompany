# Deploy Mintlify documentation
# Triggers on push to docs-MachinaOs/ or manual dispatch

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-MachinaOs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Mintlify CLI
        run: npm install -g mintlify

      - name: Deploy to Mintlify
        working-directory: docs-MachinaOs
        env:
          MINTLIFY_TOKEN: ${{ secrets.MINTLIFY_TOKEN }}
        run: mintlify deploy
