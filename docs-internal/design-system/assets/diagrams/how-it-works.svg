  <rect x="190" y="430" width="120" height="28" class="integration-pill"></rect>
  <text x="250" y="449" text-anchor="middle" class="integration-text">🔍 Web Search</text>

  <rect x="320" y="430" width="130" height="28" class="integration-pill"></rect>
  <text x="385" y="449" text-anchor="middle" class="integration-text">🕷 Web Scraping</text>

