# Reusable workflow: publish machinaos-server to PyPI via OIDC.
#
# Called from release.yml after the npm publish step succeeds. Uses
# PyPI Trusted Publishing (https://docs.pypi.org/trusted-publishers/)
# so no PYPI_TOKEN secret is needed -- the workflow's OIDC token is
# exchanged for a short-lived publish token at PyPI's side.
#
# One-time admin step to enable this:
#   1. On PyPI -> Account -> Publishing -> "Add a new pending
#      publisher", set:
#        repo:          zeenie-ai/MachinaOS
#        workflow file: publish-pypi.yml
#        environment:   pypi
#   2. Push a tag to trigger the first release -- PyPI promotes the
#      pending publisher to active on first successful exchange.
#
# Pattern lifted from PrefectHQ/prefect + pypa/hatch. uv itself uses
# `uv publish` directly; we prefer pypa/gh-action-pypi-publish for
# cleaner OIDC integration + audit-tab visibility.

name: Publish to PyPI

on:
  workflow_call:
    inputs:
      package_dir:
        description: 'Directory containing the package to publish (relative to repo root).'
        type: string
        default: 'server'
      dry_run:
        description: 'Build the wheel but skip the upload step.'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    outputs:
      dist_path: ${{ steps.locate.outputs.dist_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          # cache: false in release jobs (wrangler hardening) -- a
          # poisoned pip cache would taint the wheel.
          cache: ''

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build wheel + sdist
        # `uv build` produces both wheel + sdist by default. Outputs
        # land in `<package_dir>/dist/`. The release flow uses
        # `--no-sources` to ensure no editable-install metadata
        # leaks into the published artifact.
        working-directory: ${{ inputs.package_dir }}
        run: uv build --no-sources

      - name: Locate dist directory
        id: locate
        run: |
          echo "dist_path=${{ inputs.package_dir }}/dist" >> "$GITHUB_OUTPUT"

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pypi-dist
          path: ${{ inputs.package_dir }}/dist/
          retention-days: 1

  attest:
    name: Generate SLSA build provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # OIDC token issuance for attestation signing.
      id-token: write
      # Required to write the attestation back to the GitHub
      # attestations endpoint.
      attestations: write
      contents: read
    steps:
      - name: Download dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pypi-dist
          path: dist/

      - name: Attest build provenance
        # Pattern from astral-sh/uv's release workflow. Each wheel +
        # sdist gets its own attestation in the GitHub transparency
        # log; verifiable via `gh attestation verify`.
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: 'dist/*'

  publish:
    name: Publish to PyPI
    needs: [build, attest]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest

    # Environment binds the OIDC subject claim to a PyPI trusted
    # publisher named "pypi" (configured on PyPI's side -- see
    # docstring). PyPI rejects exchange attempts from any other env.
    environment:
      name: pypi
      url: https://pypi.org/p/machinaos-server

    permissions:
      # Required for the OIDC token exchange with PyPI.
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI
        # pypa/gh-action-pypi-publish handles the OIDC exchange + upload.
        # `print-hash: true` writes the SHA-256 of each artifact to the
        # job log so reviewers can cross-check what landed on PyPI
        # against what the build job produced.
        uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d # v1.14.0
        with:
          packages-dir: dist/
          print-hash: true
          # Skip-existing avoids a failure when a tag is re-run after
          # PyPI already has the version (e.g. partial-success replay).
          skip-existing: true

  publish-dry-run-notice:
    name: Dry-run notice
    needs: build
    if: inputs.dry_run == true
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::publish-pypi.yml dry_run=true -- PyPI upload skipped. Build + attest succeeded."
