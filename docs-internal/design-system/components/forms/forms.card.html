<!DOCTYPE html>
<html class="dark">

<div id="root"></div>
<script type="text/babel">
const { Input, Select, RadioGroup, Textarea, Switch, Checkbox, Icon } = window.OpenCompanyDesignSystem_2559cf;

function FormsCard() {

    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '14px 24px', alignItems: 'start' }}>
      <Input placeholder="Search..." icon={<Icon name="Search" size={14} />} />
      <Select placeholder="Select model..." options={['claude-sonnet-4-5', 'gpt-4o', 'llama3.1:8b']} defaultValue="claude-sonnet-4-5" />
      <Input type="password" placeholder="sk-ant-api03-..." icon={<Icon name="KeyRound" size={14} />} />

        { value: 'brave', label: 'Brave' },
        { value: 'serper', label: 'Serper' },

          <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 14, color: 'var(--fg-default)' }}>

        <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>

ReactDOM.createRoot(document.getElementById('root')).render(<FormsCard />);
