  <text x="565" y="194" text-anchor="middle" class="node-mini-text" style="font-size: 9px; fill: #6b7280;">thinks + acts</text>

  <rect x="648" y="160" width="72" height="42" class="node-mini node-output-mini" rx="8"></rect>
