# Reusable validation workflow. Called by ci.yml and release.yml.
# Three jobs: client build + lint, backend tests, cross-OS smoke test.

name: Predeploy

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-and-lint:
    name: Build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Lint client
        run: pnpm --filter react-flow-client run lint
      - name: TypeScript check
        run: pnpm --filter react-flow-client run typecheck
      - name: Frontend tests (vitest)
        run: pnpm --filter react-flow-client run test

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: pytest
        working-directory: server
        run: |
          uv sync
          uv run pytest tests/ -v

  cli-tests:
    name: CLI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: pytest
        run: |
          uv pip install --system pytest pytest-asyncio pyyaml
          python -m pytest cli/tests/ -v

  test-build-start:
    name: Build + start (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run build

      - name: Test start (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pnpm run start &
          PID=$!
          for i in {1..15}; do
            curl -sf http://localhost:3010/health > /dev/null 2>&1 && break
            sleep 2
          done
          kill -0 $PID 2>/dev/null && pnpm run stop || (echo FAILED; exit 1)

      - name: Test start (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $job = Start-Job -ScriptBlock { Set-Location $using:PWD; pnpm run start }
          Start-Sleep -Seconds 15
          if ($job.State -eq "Running") { Stop-Job $job; Remove-Job $job }
          else { Receive-Job $job; exit 1 }
