# Reusable validation workflow called by ci.yml and release.yml
# Jobs: build-and-lint, test-build-start

name: Predeploy

on:
  workflow_call:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all services
        run: pnpm run build

      - name: Lint client
        run: pnpm --filter react-flow-client run lint

      - name: TypeScript check
        # Uses tsgo (`@typescript/native-preview`, pinned in client/package.json).
        # ~5x faster than tsc on this codebase; both pass identically.
        # `typecheck:tsc` script remains available as a fallback if tsgo regresses.
        run: pnpm --filter react-flow-client run typecheck

      - name: Frontend tests (vitest)
        # 148 tests covering hooks, contexts, components. Uses jsdom +
        # @testing-library/react. Must stay green for canvas state, auth
        # bootstrap, and credentials flows to ship.
        run: pnpm --filter react-flow-client run test

      - name: Backend tests (server pytest)
        # 922 tests covering plugin contracts, credential broadcasts, native
        # LLM SDK wiring, parameter resolution, workflow ops, MCP tokens.
        # `--extra dev` adds pytest, pytest-asyncio, pytest-mock, respx on
        # top of the venv that `pnpm run build` already created via `uv sync`.
        working-directory: server
        run: |
          uv sync --extra dev
          uv run pytest tests/ -v

      - name: Machina CLI tests (pytest)
        # 105 tests covering build/start/stop pipelines, daemon, ports, docs,
        # release config. Run from repo root — tests resolve workspace paths
        # via `pnpm list --json` (see machina/tests/conftest.py).
        run: |
          uv pip install --system pytest pytest-asyncio
          python -m pytest machina/tests/ -v

  # Test build and start from source (cross-platform)
  test-build-start:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm run build

      - name: Verify build artifacts
        shell: bash
        run: |
          test -d "client/dist" && echo "client/dist/ exists" || (echo "client/dist/ missing" && exit 1)
          test -d "server/.venv" && echo "server/.venv/ exists" || (echo "server/.venv/ missing" && exit 1)
          # edgymeow binary checked in test-install.yml (CI skips binary download)

      - name: Test start (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pnpm run start &
          PID=$!

          for i in {1..15}; do
            if curl -sf http://localhost:3010/health > /dev/null 2>&1; then
              echo "Backend healthy after $((i*2))s"
              break
            fi
            sleep 2
          done

          if kill -0 $PID 2>/dev/null; then
            echo "pnpm run start: OK"
            pnpm run stop || kill $PID 2>/dev/null || true
          else
            echo "pnpm run start: FAILED"
            exit 1
          fi

      - name: Test start (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $job = Start-Job -ScriptBlock {
            Set-Location $using:PWD
            pnpm run start
          }
          Start-Sleep -Seconds 15

          try {
            $response = Invoke-WebRequest -Uri "http://localhost:3010/health" -UseBasicParsing -TimeoutSec 5
            Write-Host "Backend healthy: $($response.StatusCode)"
          } catch {
            Write-Host "Backend not responding"
          }

          if ($job.State -eq "Running") {
            Write-Host "pnpm run start: OK"
            Stop-Job $job
            Remove-Job $job
          } else {
            Write-Host "pnpm run start: FAILED"
            Receive-Job $job
            exit 1
          }
