# Dependabot — weekly grouped dependency updates.
#
# Three ecosystems mirror the repo's actual dependency surface:
#   - npm:            root package.json + pnpm workspace members
#                     (client, server/nodejs). Dependabot v2 follows
#                     pnpm workspaces from the root manifest.
#   - pip:            machinaos-cli at the repo root and machinaos-server
#                     under server/. Listed separately because they're
#                     independent uv projects with their own pyproject.toml
#                     and uv.lock (see Phase 1 of the CLI refactor —
#                     the CLI is intentionally NOT in the server's uv
#                     workspace).
#   - github-actions: pinned commit SHAs in every workflow + the
#                     composite action; Dependabot rewrites the SHA
#                     and the trailing version comment together.
#
# Groups keep the PR firehose manageable: one weekly PR per
# (ecosystem, dependency-type) instead of per-package noise.
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Anti-spam: open-pull-requests-limit caps each ecosystem so a single
# burst (e.g. a major React release rippling through devDeps) can't
# flood the review queue. The cap is per ecosystem; total ceiling is
# 5 ecosystems x 10 = 50 open Dependabot PRs at any time.

version: 2

updates:
  # ---- npm (workspace root + pnpm members) -------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    versioning-strategy: "increase-if-necessary"
    groups:
      npm-dev-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      npm-prod-deps:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      # Major bumps stay ungrouped so the diff is reviewed in isolation.

  # ---- pip: machinaos-cli (repo root pyproject.toml) ---------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      cli-deps:
        update-types: ["minor", "patch"]

  # ---- pip: machinaos-server (server/pyproject.toml) ---------------------
  - package-ecosystem: "pip"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      server-deps:
        update-types: ["minor", "patch"]

  # ---- GitHub Actions ----------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      action-updates:
        update-types: ["minor", "patch", "major"]
