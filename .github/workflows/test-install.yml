# Test user installation scenarios
# Runs on: manual trigger, after release publish

name: Test Install

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  # Test npm install from registry (post-release)
  test-npm-install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        # Required so .python-version is on disk for setup-python below.
        # The actual MachinaOS install under test comes from npm / a
        # separate git clone -- this checkout is only used to source
        # the toolchain version file (single source of truth).
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version

      - name: Install uv
        run: pip install uv

      - name: Install machinaos from npm
        run: npm install -g machinaos

      - name: Verify installation
        shell: bash
        run: |
          machina --help
          machina --version

      - name: Check edgymeow binary
        shell: bash
        run: |
          INSTALL_PATH=$(npm root -g)/machinaos
          echo "Install path: $INSTALL_PATH"
          ls -la "$INSTALL_PATH/node_modules/edgymeow/bin/" || echo "edgymeow bin/ not found"

      - name: Setup Python venv
        shell: bash
        run: |
          INSTALL_PATH=$(npm root -g)/machinaos
          cd "$INSTALL_PATH/server"
          uv venv
          uv sync

      - name: Test start (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          machina start &
          PID=$!

          for i in {1..15}; do
            if curl -sf http://localhost:3010/health > /dev/null 2>&1; then
              echo "Backend healthy after $((i*2))s"
              break
            fi
            sleep 2
          done

          if kill -0 $PID 2>/dev/null; then
            echo "machina start: OK"
            machina stop || kill $PID 2>/dev/null || true
          else
            echo "machina start: FAILED"
            exit 1
          fi

      - name: Test start (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $job = Start-Job -ScriptBlock { machina start }
          Start-Sleep -Seconds 15

          try {
            $response = Invoke-WebRequest -Uri "http://localhost:3010/health" -UseBasicParsing -TimeoutSec 5
            Write-Host "Backend healthy: $($response.StatusCode)"
          } catch {
            Write-Host "Backend not responding"
          }

          if ($job.State -eq "Running") {
            Write-Host "machina start: OK"
            Stop-Job $job
            Remove-Job $job
          } else {
            Write-Host "machina start: FAILED"
            Receive-Job $job
            exit 1
          }

  # Test git clone + pnpm run build (source contributor path)
  test-git-clone:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        # Required so .python-version is on disk for setup-python below.
        # The actual MachinaOS install under test comes from npm / a
        # separate git clone -- this checkout is only used to source
        # the toolchain version file (single source of truth).
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version

      - name: Install uv
        run: pip install uv

      - name: Clone repository
        run: git clone https://github.com/zeenie-ai/MachinaOS.git

      - name: Build
        shell: bash
        working-directory: MachinaOS
        run: |
          # Retry up to 3 times for transient GitHub CDN failures (HTTP 502)
          for i in 1 2 3; do
            pnpm run build && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Check edgymeow binary
        shell: bash
        working-directory: MachinaOS
        run: |
          ls -la node_modules/.pnpm/edgymeow@*/node_modules/edgymeow/bin/ || echo "edgymeow bin/ not found"

      - name: Test start (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: MachinaOS
        run: |
          pnpm run start &
          PID=$!

          for i in {1..15}; do
            if curl -sf http://localhost:3010/health > /dev/null 2>&1; then
              echo "Backend healthy after $((i*2))s"
              break
            fi
            sleep 2
          done

          if kill -0 $PID 2>/dev/null; then
            echo "pnpm run start: OK"
            pnpm run stop || kill $PID 2>/dev/null || true
          else
            echo "pnpm run start: FAILED"
            exit 1
          fi

      - name: Test start (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: MachinaOS
        run: |
          $job = Start-Job -ScriptBlock {
            Set-Location $using:PWD
            pnpm run start
          }
          Start-Sleep -Seconds 15

          try {
            $response = Invoke-WebRequest -Uri "http://localhost:3010/health" -UseBasicParsing -TimeoutSec 5
            Write-Host "Backend healthy: $($response.StatusCode)"
          } catch {
            Write-Host "Backend not responding"
          }

          if ($job.State -eq "Running") {
            Write-Host "pnpm run start: OK"
            Stop-Job $job
            Remove-Job $job
          } else {
            Write-Host "pnpm run start: FAILED"
            Receive-Job $job
            exit 1
          }

  # Test install.sh script (Linux/macOS)
  test-install-script-unix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Run install script
        run: curl -fsSL https://raw.githubusercontent.com/zeenie-ai/MachinaOS/main/install.sh | bash

      - name: Verify installation
        run: |
          machina --help
          machina --version

  # Test install.ps1 script (Windows)
  test-install-script-windows:
    runs-on: windows-latest
    steps:
      - name: Run install script
        shell: pwsh
        run: iwr -useb https://raw.githubusercontent.com/zeenie-ai/MachinaOS/main/install.ps1 | iex

      - name: Verify installation
        run: |
          machina --help
          machina --version
