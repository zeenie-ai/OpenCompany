# Shared environment setup: Node, Python, uv, CLI deps.
name: 'Setup OpenCompany Environment'
description: 'Setup Node.js, Python, uv, and the supervisor CLI.'

inputs:
  node-version:
    description: 'Node.js version'
    default: '22'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        # ``cache:`` intentionally omitted -- setup-node's post-job cache
        # save fails with ``Path Validation Error`` in jobs that didn't
        # actually run pnpm (e.g. CLI / Backend test lanes), marking
        # the whole job red even though every test passed.
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: false
    - name: Install supervisor CLI
      shell: bash
      run: uv pip install --system -e .
